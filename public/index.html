<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard.show {
            display: block;
        }

        .top-bar {
            background: white;
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .welcome h1 {
            color: #1a202c;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .welcome p {
            color: #718096;
            font-size: 14px;
        }

        .user-email {
            color: #667eea;
            font-weight: 600;
        }

        .logout-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .card h2 {
            color: #1a202c;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .card p {
            color: #718096;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="top-bar">
            <div class="welcome">
                <h1>Welcome Back! 👋</h1>
                <p>Logged in as: <span class="user-email" id="userEmail">Loading...</span></p>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <div class="cards">
            <div class="card">
                <div class="card-icon">📊</div>
                <h2>Analytics</h2>
                <p>View your dashboard analytics and performance metrics.</p>
            </div>
            <div class="card">
                <div class="card-icon">⚙️</div>
                <h2>Settings</h2>
                <p>Customize your account preferences and settings.</p>
            </div>
            <div class="card">
                <div class="card-icon">📁</div>
                <h2>Projects</h2>
                <p>Access and manage all your projects.</p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBjAIrC5QuqUoOVP3eROyKw6ITsBm2dgnM",
            authDomain: "firbase-1216.firebaseapp.com",
            projectId: "firbase-1216",
            storageBucket: "firbase-1216.firebasestorage.app",
            messagingSenderId: "674272414750",
            appId: "1:674272414750:web:2bf4c4923a58fe000db20f"
        };

        // Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check auth
        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loading');
            const dashboard = document.getElementById('dashboard');
            const userEmail = document.getElementById('userEmail');

            if (user) {
                // User logged in
                userEmail.textContent = user.email;
                loading.style.display = 'none';
                dashboard.classList.add('show');
            } else {
                // Not logged in - redirect
                window.location.href = 'login.html';
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
